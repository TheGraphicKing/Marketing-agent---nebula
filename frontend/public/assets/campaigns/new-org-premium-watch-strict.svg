<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="New org premium product advertisement">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8965EC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8965EC" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="softGlow" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="watchHalo" cx="50%" cy="50%" r="48%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="brandShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#8965EC" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="#8965EC"/>
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <circle cx="540" cy="520" r="420" fill="url(#softGlow)"/>

  <g filter="url(#brandShadow)">
    <image href="new-org-logo.png" x="460" y="64" width="160" height="160" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g transform="translate(300 250)">
    <ellipse cx="240" cy="415" rx="230" ry="44" fill="#FFFFFF" fill-opacity="0.16"/>
    <circle cx="240" cy="215" r="220" fill="url(#watchHalo)"/>

    <rect x="145" y="8" width="190" height="120" rx="58" fill="#FFFFFF" fill-opacity="0.86"/>
    <rect x="145" y="304" width="190" height="120" rx="58" fill="#FFFFFF" fill-opacity="0.86"/>

    <rect x="90" y="96" width="300" height="250" rx="78" fill="#FFFFFF" fill-opacity="0.93"/>
    <rect x="110" y="116" width="260" height="210" rx="62" fill="#8965EC"/>

    <circle cx="240" cy="220" r="70" fill="#FFFFFF" fill-opacity="0.95"/>
    <circle cx="240" cy="220" r="58" fill="#8965EC"/>
    <path d="M240 184 L240 220 L268 236" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <rect x="196" y="254" width="88" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.92"/>
    <rect x="208" y="274" width="64" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.84"/>
  </g>

  <text x="540" y="842" text-anchor="middle" fill="#FFFFFF" font-family="'Playfair Display', Georgia, serif" font-size="78" letter-spacing="1.8" font-weight="600">
    ELEVATE YOUR PERFORMANCE
  </text>

  <text x="540" y="902" text-anchor="middle" fill="#FFFFFF" font-family="'Playfair Display', Georgia, serif" font-size="30" letter-spacing="5" fill-opacity="0.95">
    Precision Wearable for Modern Excellence
  </text>
</svg>
