<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="Premium Instagram campaign poster with strict New org brand lock">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8965EC"/>
      <stop offset="100%" stop-color="#7C58E2"/>
    </linearGradient>
    <radialGradient id="light" cx="52%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="product" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAEAF0"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="540" cy="520" r="410" fill="url(#light)"/>

  <image href="new-org-logo.png" x="74" y="74" width="128" height="128" preserveAspectRatio="xMidYMid meet"/>

  <g transform="translate(165 355)" filter="url(#shadow)">
    <ellipse cx="365" cy="330" rx="258" ry="42" fill="#FFFFFF" opacity="0.14"/>

    <path d="M108 248 C137 212, 206 186, 304 180 C395 174, 489 194, 593 238 C628 252, 674 258, 726 260 C742 261, 754 273, 755 289 C756 306, 744 318, 728 319 L611 326 C572 328, 541 318, 504 300 C437 267, 370 260, 290 267 L214 274 C157 279, 121 278, 93 268 C77 262, 78 246, 108 248 Z"
      fill="url(#product)"/>

    <path d="M132 243 C161 215, 225 194, 310 190 C405 185, 500 206, 611 249 C644 261, 687 267, 726 268"
      fill="none" stroke="#FFFFFF" stroke-width="7.5" stroke-linecap="round" opacity="0.94"/>

    <path d="M237 280 C312 265, 390 268, 466 296" fill="none" stroke="#DADAE4" stroke-width="4.8" opacity="0.72"/>
    <path d="M504 303 C544 320, 584 322, 630 317" fill="none" stroke="#DADAE4" stroke-width="4.2" opacity="0.72"/>

    <path d="M216 292 L246 292 M272 289 L302 289 M328 288 L358 289 M384 290 L414 292"
      stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" opacity="0.76"/>
  </g>

  <text x="540" y="830" text-anchor="middle" fill="#FFFFFF" font-family="'Playfair Display', Georgia, serif" font-size="84" letter-spacing="1.2" font-weight="600">
    Elevated Essentials
  </text>

  <text x="540" y="886" text-anchor="middle" fill="#FFFFFF" font-family="'Playfair Display', Georgia, serif" font-size="30" letter-spacing="6.5" opacity="0.94">
    Premium Campaign Visual
  </text>
</svg>
