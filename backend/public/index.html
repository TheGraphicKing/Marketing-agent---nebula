    <script>
      // Configure tailwind when it loads
      function configureTailwind() {
        if (typeof tailwind !== 'undefined' && tailwind.config) {
          tailwind.config = {
            darkMode: 'class',
            theme: {
              extend: {
                colors: {
                  nebula: {
                    dark: '#070A12',
                    gold: '#ffcc29',
                    silver: '#ededed',
                  }
                }
              }
            }
          };
          return true;
        }
        return false;
      }
      
      // Retry configuration
      var configRetries = 0;
      function tryConfigureTailwind() {
        if (!configureTailwind() && configRetries < 100) {
          configRetries++;
          setTimeout(tryConfigureTailwind, 50);
        }
      }
      tryConfigureTailwind();
    </script>
